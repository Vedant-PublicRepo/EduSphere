<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>EduSphere — Student Management System</title>
    <script>
      (() => {
        try {
          if (localStorage.getItem("edusphere-theme") === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (error) {
          console.warn("Theme preference could not be restored.", error);
        }
      })();
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/edusphere.css" />
  </head>

  <body>
    <div id="app">
      <!-- LOGIN -->
      <div id="loginScreen" class="login-screen hidden">
        <div class="login-panel">
          <div class="brand">
            <div class="brand-mark">
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="none"
                stroke="#fff"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M2 9 12 4l10 5-10 5L2 9Z" />
                <path d="M6 12v4c0 2 2.7 4 6 4s6-2 6-4v-4" />
                <path d="M20 11v5" />
                <circle cx="20" cy="16.5" r="1.2" fill="#fff" stroke="none" />
              </svg>
            </div>
            <div>
              <div style="color: #fff">EduSphere</div>
              <div
                style="
                  font-size: 0.75rem;
                  color: rgba(255, 255, 255, 0.5);
                  font-family: var(--font-body);
                "
              >
                Student Management System
              </div>
            </div>
          </div>
          <div class="login-card">
            <h1>Login</h1>
            <p>Enter your account details to continue</p>
            <form id="loginForm" novalidate>
              <div class="field">
                <label>Role</label>
                <select id="roleSelect">
                  <option value="">Select your role</option>
                  <option value="admin">Admin</option>
                  <option value="faculty">Faculty</option>
                  <option value="student">Student</option>
                </select>
              </div>
              <div class="field">
                <label>Email</label>
                <input
                  id="userInput"
                  type="text"
                  autocomplete="username"
                  placeholder="Enter your email"
                />
              </div>
              <div class="field" style="position: relative">
                <label>Password</label>
                <input
                  id="passInput"
                  type="password"
                  autocomplete="current-password"
                  placeholder="Enter password"
                />
                <button
                  type="button"
                  class="eye-btn"
                  id="eyeBtn"
                  style="
                    position: absolute;
                    right: 12px;
                    bottom: 12px;
                    background: none;
                    border: none;
                  "
                ></button>
              </div>
              <div class="forgot-row">
                <a href="#" class="text-link" id="forgotLink"
                  >Forgot Password?</a
                >
              </div>
              <button type="submit" class="login-btn">Login</button>
              <div class="login-err" id="loginErr"></div>
              <div class="login-footer">
                <span
                  >Need an account?
                  <a href="#" class="text-link" id="signupLink"
                    >Contact admin</a
                  ></span
                >
              </div>
            </form>
          </div>
        </div>
        <div class="right-panel">
          <div class="blob1 blob"></div>
          <div class="blob2 blob"></div>
          <div class="blob3 blob"></div>
          <div class="hero-copy">
            <h2>Welcome to<br /><span>Student</span><br />Portal</h2>
            <p>
              Manage everything from one elegant dashboard.<br />Built for
              admins, faculty & students.
            </p>
            <div class="hero-illustration">
              <img
                src="assets/images/undraw_team-up_qeem.svg"
                alt="hero-illustration"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- DASHBOARD -->
      <div id="dashboardShell" class="dashboard-shell hidden">
        <div id="sidebarOverlay" class="sidebar-overlay"></div>
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-brand">
            <div class="sidebar-logo">
              <svg
                viewBox="0 0 24 24"
                width="26"
                height="26"
                fill="none"
                stroke="white"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M2 9 12 4l10 5-10 5L2 9Z" />
                <path d="M6 12v4c0 2 2.7 4 6 4s6-2 6-4v-4" />
                <path d="M20 11v5" />
                <circle cx="20" cy="16.5" r="1.2" fill="white" stroke="none" />
              </svg>
            </div>
            <div>
              <div class="sidebar-name">EduSphere</div>
              <div class="sidebar-sub">Campus hub</div>
            </div>
          </div>
          <nav class="nav-list" id="navList"></nav>
          <div class="sidebar-bottom">
            <button class="nav-item" id="logoutBtn" style="width: 100%">
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="1.9"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <path d="m16 17 5-5-5-5" />
                <path d="M21 12H9" />
              </svg>
              <span>Logout</span>
            </button>
          </div>
        </aside>
        <main class="main-panel" id="mainPanel">
          <div class="topbar">
            <button class="hamburger icon-btn" id="hamburger">
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            <div class="search-bar">
              <svg
                viewBox="0 0 24 24"
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <circle cx="11" cy="11" r="7" />
                <path d="m20 20-3.5-3.5" />
              </svg>
              <input
                type="text"
                id="searchInput"
                placeholder="Search anything..."
              />
            </div>
            <div class="topbar-right">
              <button
                class="icon-btn dark-toggle"
                id="darkToggle"
                title="Toggle dark mode"
              >
                🌙
              </button>
              <button class="icon-btn" id="notifBtn" title="Notifications">
                <svg
                  viewBox="0 0 24 24"
                  width="20"
                  height="20"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M15 17H5l1.4-1.4A2 2 0 0 0 7 14.2V11a5 5 0 0 1 10 0v3.2c0 .53.2 1.04.6 1.4L19 17h-4"
                  />
                  <path d="M10 20a2 2 0 0 0 4 0" />
                </svg>
                <span class="notif-dot hidden" id="notifDot"></span>
              </button>
              <div class="user-chip">
                <div class="avatar" id="userAvatar"></div>
                <div>
                  <div class="user-name" id="userName"></div>
                  <div class="user-role" id="userRole"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="banner" id="banner"></div>
          <div id="sectionsHost"></div>
        </main>
      </div>
    </div>

    <!-- MODALS -->
    <div class="modal" id="entityModal">
      <div class="modal-card">
        <div class="modal-head">
          <div>
            <h3 id="modalTitle">Add Record</h3>
            <p
              id="modalSub"
              style="color: var(--muted); font-size: 0.88rem; margin-top: 4px"
            ></p>
          </div>
          <button class="close-btn" id="closeModal">✕</button>
        </div>
        <form id="entityForm"></form>
      </div>
    </div>
    <div class="modal confirm-dialog" id="confirmModal">
      <div class="modal-card">
        <div class="confirm-icon">🗑</div>
        <h3 id="confirmTitle">Are you sure?</h3>
        <p
          id="confirmMsg"
          style="color: var(--muted); margin-top: 8px; font-size: 0.92rem"
        ></p>
        <div class="confirm-btns">
          <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
          <button class="btn btn-danger" id="confirmOk">Delete</button>
        </div>
      </div>
    </div>

    <!-- TOAST STACK -->
    <div id="toastStack"></div>

    <script src="assets/js/edusphere.js"></script>
  </body>
</html>
