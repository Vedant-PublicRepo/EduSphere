services:
  - type: web
    name: edusphere
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        sync: false
      - key: EDUSPHERE_SECRET_KEY
        sync: false
      - key: EDUSPHERE_ADMIN_EMAIL
        sync: false
      - key: EDUSPHERE_ADMIN_PASSWORD
        sync: false
      - key: EDUSPHERE_ADMIN_NAME
        sync: false
      - key: EDUSPHERE_ADMIN_PHONE
        sync: false
      - key: GEMINI_API_KEY
        sync: false
